services:
  backend:
    build: ./backend
    container_name: imss-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_PATH: /app/data/imss.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    volumes:
      - sqlite_data:/app/data
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: imss-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
