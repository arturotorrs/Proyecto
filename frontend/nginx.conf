server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API al backend
    # ${BACKEND_URL} se sustituye en tiempo de arranque del contenedor.
    # Docker/local: http://backend:4000  |  Railway: https://mi-backend.up.railway.app
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.io al backend
    location /socket.io/ {
        proxy_pass ${BACKEND_URL}/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback — todas las rutas de React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
